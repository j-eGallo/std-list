name: Tests STD-List

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer dépendances frontend
        working-directory: ./front
        run: npm install

      - name: Build frontend
        working-directory: ./front
        run: npm run build

      - name: Installer wait-on
        run: npm install -g wait-on

      - name: Lancer le frontend Vite
        working-directory: ./front
        run: npm run dev -- --host 127.0.0.1 &

      - name: Attendre le frontend
        run: wait-on http://localhost:5173

      - name: Lancer les tests Cypress
        working-directory: ./front
        run: npx cypress run
